# Example configuration for the price elasticity & promo ROI pipeline.
#
# Copy this file to `config.yaml` and adjust paths/settings for your
# environment. Scripts can be extended to read from this config instead of
# hard-coding paths.

input:
  # Default to synthetic sample data included in the repo
  receipts_path: data/sample/synthetic_receipts.csv

  # Optional date filter for real data (ISO format). Leave empty to use all.
  start_date: null  # e.g., "2024-01-01"
  end_date: null    # e.g., "2024-03-31"

  # Optional mapping from noisy product strings to canonical names
  product_name_map_path: data/sample/product_name_map.csv

outputs:
  # Table artifacts
  price_change_events_path: reports/tables/price_change_events.csv
  elasticity_estimates_path: reports/tables/elasticity_estimates.csv
  promo_scenarios_path: reports/tables/promo_scenarios.csv

  # Figure artifacts (if plotting scripts are enabled)
  example_price_change_figure: reports/figures/example_price_change.png
  elasticity_summary_figure: reports/figures/elasticity_summary.png
  promo_roi_curves_figure: reports/figures/promo_roi_curves.png
